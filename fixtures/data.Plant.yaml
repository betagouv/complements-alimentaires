      : 1) Déconseillé en cas d’allergie aux dérivés salicylés et d’intolérance aux
      anti-inflammatoires non-stéroïdiens. 2) Déconseillé aux enfants de moins de
      12 ans, femmes enceintes ou allaitantes.'
