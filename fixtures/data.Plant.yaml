    is_obsolete: false
    public_comments: 'L’Anses, dans son avis du 19 avril 2023 relatif aux avertissements
      figurant dans les monographies EMA qu’il convient de reprendre dans le cas des
      compléments alimentaires (https://www.anses.fr/fr/system/files/NUT2019SA0155.pdf),
      relève que les avertissements suivants doivent figurer pour les compléments
      alimentaires contenant le FRUIT du Chardon-Marie : En cas d''allergie croisée
      connue en particulier à la famille des Asteraceae, ne pas consommer un CA contenant
      une préparation à base de cette partie de plante, En l’absence de données, chez
      la femme enceinte ou allaitante, éviter de consommer un CA contenant une préparation
      à base de cette partie de plante,En l’absence de données, avant l’âge de 18
      ans, éviter de consommer un CA contenant une préparation à base de cette partie
      de plante. Avis Anses/EMA (fruit, graines) : 1) Déconseillé en cas d''allergie
      croisée connue en particulier à la famille des Asteraceae ; 2) Réservé aux adultes
