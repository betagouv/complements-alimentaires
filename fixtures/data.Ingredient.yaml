    revoked_detail: ''
    siccrf_id: 932
    name: Curcumine
    is_obsolete: true
    public_comments: 'La curcumine possède des effets inhibiteurs sur l’agrégation
      plaquettaire. Elle est déconseillée aux personnes sous anti-coagulants. La curcumine
      inclut le bis-(hydroxy-4- méthoxy-3-phényl)-1,7-heptadiène-1,6-dione-3,5 et
      ses deux dérivés dérivés déméthoxy, conformément au règlement 432/2012. Saisine
      n° 2019-SA-0111 de l''ANSES relatif à « l’évaluation des risques liés à la consommation
      de compléments alimentaires contenant du curcuma » : "L’analyse de l’exposition
      de la population française à la curcumine par l’alimentation a montré qu’elle
      reste faible au regard de la dose journalière admissible (DJA) établie par l’Efsa,
      hors compléments alimentaires. Partant de cette analyse, l’expertise a déterminé
      que la prise de tels compléments ne soulève pas de préoccupation particulière
      tant que leur consommation ne constitue pas un apport de plus de 153 mg de curcumine
      par jour pour un adulte de 60 kg."'
    private_comments: ''
    siccrf_public_comments_en: ''
