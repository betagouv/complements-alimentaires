    regulatory_resource_links: null
    origin_declaration: null
    revoked_detail: ''
    siccrf_id: 987
    name: N-acétylglucosamine
    is_obsolete: false
    public_comments: L’Anses, dans son avis du 4 janvier 2019 (https://www.anses.fr/fr/system/files/NUT2015SA0069.pdf),
      a noté que l’expertise conduite a mis en évidence des populations spécifiques
      pour lesquelles la consommation de compléments alimentaires contenant de la
      glucosamine présente un risque. Ainsi elle déconseille la consommation de compléments
      alimentaires contenant cette substance aux :(a) personnes diabétiques ou pré-diabétiques,
      asthmatiques ou traitées par anti-vitamine K ; (b) personnes présentant une
      allergie alimentaire aux crustacés ou aux insectes ;(c) personnes dont l’alimentation
      est contrôlée pour le sodium, le potassium ou le calcium, car ces compléments
      peuvent en être une source importante ;(d) femmes enceintes ou allaitantes et
      aux enfants, en raison de l’insuffisance des données sur la sécurité de ces
      produits.
    private_comments: ''
    siccrf_public_comments_en: ''
