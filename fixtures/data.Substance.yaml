    public_comments: 'Novel Food : Autorisation pour un extrait d''Haematococcus pluvialis
      riche en astaxanthine sous réserve de ne pas dépasser 8 mg / jour.La dénomination
      du nouvel aliment sur l’étiquetage est “oléorésine riche en astaxanthine extraite
      de l’algue Haematococcus pluvialis” L’étiquetage porte une mention indiquant
      qu’ils ne doivent pas être consommés par les nourrissons, les enfants et les
      adolescents de moins de 14 ans.» Autorisation pour l''huile de Calanus,à l''exclusion
      des nourrissons et enfants en bas âge : la dénomination sur l''étiquetage est
      “huile de Calanus finmarchicus (crustacé)” + avertissement indiquant que le
      complément alimentaire ne doit pas être consommé le même jour que d''autres
      compléments alimentaires contenant des esters d''astaxanthine Doses max :- 1g/j
      d''esters d''astaxanthine pour la population générale, à l''exception des nourrissons
      et enfants en bas âge (moins de 3 ans). - 2,3 g/j d’esters d’astaxanthine pour
      la population générale âgée de plus de 14 ans'
