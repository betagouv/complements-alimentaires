    private_comments: ''
    siccrf_public_comments_en: ''
    siccrf_private_comments_en: 'Wikipedia : Delphinidin (also delphinidine) is an
      anthocyanidin, a primary plant pigment, and also an antioxidant.[3] Delphinidin
      gives blue hues to flowers in the genera Viola and Delphinium. It also gives
      the blue-red color of the grape that produces Cabernet Sauvignon, and can be
      found in cranberries and Concord grapes as well as pomegranates, and bilberries.
      Delphinidin, like nearly all other anthocyanidins, is pH-sensitive, i.e. a natural
      pH indicator, and changes from red in acidic solution to blue in basic solution'
