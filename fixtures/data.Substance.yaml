      pharmaceutique est indiquée dans les troubles fonctionnels digestifs observés
      au cours des hépatopathies. Elle conduit à un apport journalier en silymarine
      compris entre 280 à 420 mg par jour, donc 266 mg max par jour pour tenir compte
      de la tolérance de 5 %.
    private_comments: dose pharmacologique confirmée par mail ANSM dec. 2021, Le LEGALON
      n’est plus commercialisé en FR mais il l’est toujours dans d’autres EM (notamment
      DE, BE et LV) avec une forme « protect » à 70 mg/ comprimé (forme initialement
      MM en FR ; https://www.homoempatia.eu/product/legalon-protect-madaus-gelules-a-enveloppe-dure.246410.html?language_code=fr)
      et une forme « forte » à 140 mg/comprimé (https://www.homoempatia.eu/product/legalon-forte-madaus-hartkapseln.5649495.html?language_code=fr).Monographie
      EMA ou OMS (voir page 310, dose silymarine entre 200 et 400 mg ; https://apps.who.int/iris/bitstream/handle/10665/42052/9241545372.pdf?sequence=2&isAllowed=y)
      ne concernent que le fruit. Afin d'avoir une approche harmonisée sur les teneurs
      prises en compte dans le cas des médicaments par fonction, on retient 5% sachant
      que la posologie du LEGALON 70 mg conduit à un apport en silymarine compris
      entre 280 à 420 mg par jour => soit 266 mg max/j.
